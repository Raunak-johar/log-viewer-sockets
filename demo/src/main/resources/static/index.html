<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Log Updates</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sockjs-client/1.6.1/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>

    <script>

        //var socket = new SockJS('/logs');
        const stompClient = new StompJs.Client({
    brokerURL: 'ws://localhost:8081/logs'
});
                stompClient.activate({}, function(frame) {
                    console.log('Connected: ' + frame);
                    stompClient.subscribe('/logs', function(messageOutput) {
                       const node = doc.getElementById("logs-id");
                       node.appendChild(JSON.parse(messageOutput.body));
                    });
                });
    </script>

</head>
<body id="logs-id">
Log Real Time updates
</body>
</html>
